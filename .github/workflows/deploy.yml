name: Fault Management CI/CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  fault-mgnt-tests:
    runs-on: ubuntu-latest
    
    # 1. Faster Services
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: fault_api
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready -U postgres" --health-interval=10s

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup PHP with Cache
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: pdo_pgsql, pgsql
          coverage: none

      # 3. Cache Composer (Fastest way)
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-${{ hashFiles('**/composer.lock') }}

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # 4. Safe Database Update (No Fresh Run)
      - name: Run Migrations (Safe)
        run: |
          cp .env.example .env
          php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: fault_api
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      # 5. Continuous Deployment (CD)
      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/your-project-path
            git pull origin master
            composer install --no-interaction --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
